<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孙巴二主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <h1>互联网厕所之孙巴二</h1>
        <nav>
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">关于</a></li>
                <li><a href="#">加入我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- 产品介绍 -->
    <section class="intro">
        <div class="intro-content">
            <h2>孙巴二</h2>
            <p>我们的目标是收集互联网所有的屎</p>
            <a href="#" class="cta-button">马上吃屎</a>
        </div>
        <img src="https://img.cdn1.vip/i/69dc87ede8935_1776060397.webp" alt="孙巴二头像">
    </section>

    <!-- 产品特点 -->
    <section class="features">
        <h2>了解孙巴二</h2>
        <div class="feature-list">
            <div class="feature-item">
                <img src="https://test.fukit.cn/autoupload/f/WYioeSs9VDAmJxUc7qF0wdiO_OyvX7mIgxFBfDMDErs/20260413/fVYl/619X402/image.png/webp" alt="人员构成">
                <h3>人员活跃</h3>
                <p>时刻准备吃屎</p>
            </div>
            <div class="feature-item">
                <img src="https://test.fukit.cn/autoupload/f/WYioeSs9VDAmJxUc7qF0wdiO_OyvX7mIgxFBfDMDErs/20260413/13uW/966X485/image.png/webp" alt="示例">
                <h3>开团秒跟</h3>
                <p>+1+1+1+1+1</p>
            </div>
        </div>
    </section>

    <!-- 注册表单 -->
    <section class="form">
        <h2>立即加入</h2>
        <form>
            <div class="form-group">
                <label for="name">称谓</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">qq号</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">密钥</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="submit-button">启动！</button>
        </form>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 孙巴二保留所有权利</p>
    </footer>
</body>
</html>
